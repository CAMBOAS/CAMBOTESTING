<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAMBO MINI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 
 <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/orders.css" />
</head>
<body data-page="orders" class="light">
  <div id="layout-root"></div>
  <div id="page-content" hidden>
  <div class="app-shell">
    <div class="page-wrap">
      <!-- Filter -->
      <section class="glass-card filter-card">
        <div class="field-group filter-item">
          <label>Pages</label>
          <select id="page">
            <option value="">Select...</option>
            <option>Helen CCR</option>
            <option>Brand1 CCR</option>
            <option>JELY BRAND BY HELEN</option>
            <option>JELY CCR BRAND</option>
            <option>ចែម៉ៅ CCR BRAND</option>
            <option>ហេឡេន CCR</option>
            <option>ស្រីម៉ៅ JELY</option>
            <option>ស្រីម៉ៅ JELY BRAND </option>
          </select>
        </div>

        <div class="field-group filter-item">
          <label>CloseBy</label>
          <select id="closeBy">
            <option value="">Select...</option>
            <option>Jonh Helen</option>
            <option>Jonh Wick</option>
            <option>Srey Pichh</option>
            <option>Srey Phear</option>
            <option>Bong Phear</option>
            <option>Admin</option>
          </select>
        </div>

        <div class="field-group filter-item">
          <label>Status</label>
          <select id="status">
            <option value="Pending">Pending</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Done">Done</option>
            <option value="Cancel">Cancel</option>
          </select>
        </div>
      </section>

      <!-- Customer Info -->
      <section class="glass-card section-card">
        <h2 class="section-title">ព័ត៌មានអតិថិជន</h2>

        <div class="form-grid">
          <div class="field-group">
            <label>ឈ្មោះអតិថិជន</label>
            <input type="text" id="customer" placeholder="customer..." />
          </div>

          <div class="field-group">
            <label>លេខទូរសព្ទ</label>
            <input type="text" id="phone" placeholder="phone..." />
          </div>

          <div class="field-group">
            <label>ថ្ងៃខែឆ្នាំ</label>
            <input type="date" id="date" />
          </div>

          <div class="field-group span-2">
            <label>ទីតាំង</label>
            <select id="province">
              <option value="">ជ្រើសរើសទីតាំង...</option>
              <option>រាជធានីភ្នំពេញ</option>
              <option>ខេត្តបន្ទាយមានជ័យ</option>
              <option>ខេត្តបាត់ដំបង</option>
              <option>ខេត្តកំពង់ចាម</option>
              <option>ខេត្តកំពង់ឆ្នាំង</option>
              <option>ខេត្តកំពង់ស្ពឺ</option>
              <option>ខេត្តកំពង់ធំ</option>
              <option>ខេត្តកំពត</option>
              <option>ខេត្តកណ្តាល</option>
              <option>ខេត្តកែប</option>
              <option>ខេត្តកោះកុង</option>
              <option>ខេត្តក្រចេះ</option>
              <option>ខេត្តមណ្ឌលគិរី</option>
              <option>ខេត្តឧត្ដរមានជ័យ</option>
              <option>ខេត្តប៉ៃលិន</option>
              <option>ខេត្តព្រះវិហារ</option>
              <option>ខេត្តព្រៃវែង</option>
              <option>ខេត្តពោធិ៍សាត់</option>
              <option>ខេត្តព្រះសីហនុ</option>
              <option>ខេត្តរតនគិរី</option>
              <option>ខេត្តសៀមរាប</option>
              <option>ខេត្តស្ទឹងត្រែង</option>
              <option>ខេត្តស្វាយរៀង</option>
              <option>ខេត្តតាកែវ</option>
              <option>ខេត្តត្បូងឃ្មុំ</option>
            </select>
          </div>

          <div class="field-group">
            <label>ទីតាំងតំបន</label>
            <input type="text" id="addressDetail" placeholder="ភូមិឃុំ / ផ្លូវ / ផ្ទះលេខ..." />
          </div>

          <div class="field-group span-2">
            <label>ដឹកជញ្ជូន</label>
            <select id="deliveryName" class="select">
              <option value="">Delivery Name...</option>
              <option>ភ្នំពេញ តាធំ</option>
              <option>ភ្នំពេញ តាតូច</option>
              <option>វីរៈ ប៊ុនថាំ</option>
              <option>J&amp;T</option>
              <option>DRSB</option>
              <option>ដឹកខ្លួនឯង</option>
              <option>Other</option>
            </select>
          </div>

          <div class="field-group">
            <label>ថ្លៃដឹកជញ្ជូន</label>
            <input type="number" id="deliveryFee" placeholder="0" value="0" min="0" step="0.01" />
          </div>
        </div>

        <div class="payment-block">
          <label class="payment-label">បង់ប្រាក់</label>
          <div class="payment-options" id="paymentOptions">
            <button type="button" class="payment-btn" data-value="AC">AC</button>
            <button type="button" class="payment-btn" data-value="ABA">ABA</button>
            <button type="button" class="payment-btn" data-value="Wing">Wing</button>
            <button type="button" class="payment-btn" data-value="Delivery">Delivery</button>
            <button type="button" class="payment-btn" data-value="Other">Other</button>
          </div>
          <input type="text" id="payment" readonly placeholder="Selected payment..." />
        </div>
      </section>

      <!-- Product Section -->
      <section class="glass-card section-card">
        <div class="section-head">
        <h2 class="section-title">ផលិតផល</h2>

        <div class="product-tabs">
        <button class="tab-btn active" data-category="All">All</button>
        <button class="tab-btn" data-category="Hair">Hair</button>
        <button class="tab-btn" data-category="Body">Body</button>
        <button class="tab-btn" data-category="Face">Face</button>
        <button class="tab-btn" data-category="Drink">Drink</button>
        </div>

        </div>

        <div id="productGrid" class="product-grid"></div>

        <div class="quick-add-bar">
          <div class="quick-left">
            <input
              type="text"
              id="manualProductInput"
              class="manual-product-input"
              placeholder="Product name..."
            />
          </div>

          <div class="quick-right">
            <div class="mini-field">
              <label>QTY</label>
              <input type="number" id="manualQty" value="1" min="1" step="1" />
            </div>
            <div class="mini-field">
              <label>Price</label>
              <input type="number" id="manualPrice" value="0" min="0" step="0.01" />
            </div>
            <div class="mini-field">
              <label>Discount</label>
              <input type="number" id="manualDiscount" value="0" min="0" step="0.01" />
            </div>
            <button id="manualAddBtn" class="mini-add-btn" type="button">+</button>
          </div>
        </div>
      </section>

      <!-- Note -->
      <section class="glass-card note-card">
        <h2 class="section-title">Note</h2>
        <textarea id="note" placeholder="Write note here..."></textarea>
      </section>

      <!-- Table -->
      <section class="glass-card table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ផលិតផល</th>
                <th>ចំនួន</th>
                <th>តម្លៃ</th>
                <th>បញ្ចុះតម្លៃ</th>
                <th>សរុប</th>
                <th>លុប</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr class="empty-row">
                <td colspan="6">No products added yet.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="bottom-bar">
          <div class="total-box">
            <span>Total</span>
            <strong id="grandTotal">0.00</strong>
          </div>

          <div class="bottom-actions-wrap">
            <div class="action-buttons">
              <div class="receipt-no-inline">
                <label for="receiptNo">លេខប៉ុង</label>
                <input type="number" id="receiptNo" placeholder="បញ្ចូលលេខ..." min="0" step="1" />
              </div>

              <button id="printBtn" class="btn btn-print" type="button">Print</button>
              <button id="copyBtn" class="btn btn-copy" type="button">Copy</button>
              <button id="saveBtn" class="btn btn-save" type="button">Save</button>
              <button id="shareBtn" class="btn btn-share" type="button" aria-label="Share receipt">📤 Share</button>
            </div>

            <div class="bottom-toggle-row">
              <div class="bottom-toggle-actions">
                <button id="toggleQrBtn" class="toggle-qr-btn is-on" type="button" aria-pressed="true">QR Code: ON</button>
              </div>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>
  
<!-- Product Edit Drawer -->
<div id="drawerOverlay" class="drawer-overlay" hidden></div>
<aside id="productDrawer" class="product-drawer" aria-hidden="true">
  <div class="product-drawer-head">
    <div>
      <h3>កែផលិតផល</h3>
      <p>ចុចលើឈ្មោះផលិតផលក្នុងតារាង ដើម្បីកែ QTY / Price / Discount</p>
    </div>
    <button id="closeProductDrawerBtn" class="product-drawer-close" type="button" aria-label="Close drawer">✕</button>
  </div>

  <div class="product-drawer-body">
    <div class="drawer-summary-card">
      <span>កែទិន្នន័យផលិតផលដោយមិនចាំបាច់លុបចេញ</span>
      <strong id="drawerPreviewSubtotal">0.00</strong>
    </div>

    <div class="drawer-form-grid">
      <div class="field-group drawer-span-2">
        <label>ឈ្មោះផលិតផល</label>
        <input type="text" id="drawerEditName" placeholder="Product name..." />
      </div>

      <div class="field-group">
        <label>ចំនួន</label>
        <input type="number" id="drawerEditQty" min="1" step="1" value="1" />
      </div>

      <div class="field-group">
        <label>តម្លៃ</label>
        <input type="number" id="drawerEditPrice" min="0" step="0.01" value="0" />
      </div>

      <div class="field-group drawer-span-2">
        <label>បញ្ចុះតម្លៃ</label>
        <input type="number" id="drawerEditDiscount" min="0" step="0.01" value="0" />
      </div>
    </div>

    <div class="drawer-inline-total">
      <div class="drawer-total-box">
        <span>Subtotal</span>
        <strong id="drawerLineSubtotal">0.00</strong>
      </div>
    </div>

    <div class="drawer-actions-row">
      <button id="drawerDeleteBtn" class="btn drawer-delete-btn" type="button">Delete</button>
      <div class="drawer-right-actions">
        <button id="drawerCancelBtn" class="btn drawer-cancel-btn" type="button">Cancel</button>
        <button id="drawerSaveBtn" class="btn btn-save" type="button">Save Changes</button>
      </div>
    </div>
  </div>
</aside>

<div id="toastContainer" class="toast-container"></div>

<!-- Print Area -->
<div id="printArea" style="display:none;"></div>

<script>
    window.APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQxWk5L-hnefMrSbkrRnS-SFD-2PzAQ3RvPRUPacSYJCBZoeDZuG8xVo-fmDTdpn52uw/exec";
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </div>
  </div>
<script src="../assets/js/layout.js"></script>
<script>
  injectLayout({ basePath: "../", active: "orders", title: "ទិន្នន័យអតិថិជន", subtitle: "Create order, print receipt, and manage customer detail" });
</script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/orders.js"></script>
</body>
</html>
